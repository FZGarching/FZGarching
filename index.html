<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Babysitter-Anmeldung</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    background:#f8f8f8;
    overflow-x:hidden;
}

.circle{
    position:fixed;
    border-radius:50%;
    z-index:-1;
}

.yellow{
    width:180px;
    height:180px;
    background:#F6DC6B;
    top:-60px;
    left:-60px;
}

.blue{
    width:200px;
    height:200px;
    background:#5FA7E8;
    bottom:100px;
    left:-80px;
}

.green{
    width:200px;
    height:200px;
    background:#A9CF59;
    top:120px;
    right:-80px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

.logo{
    display:block;
    width:300px;
    max-width:90%;
    margin:0 auto 20px;
}

h1{
    text-align:center;
    font-size:50px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#555;
    margin-bottom:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.section-title{
    color:#e95d66;
    font-size:24px;
    margin-top:30px;
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.col{
    flex:1;
}

@media(max-width:700px){
    .row{
        flex-direction:column;
    }

    h1{
        font-size:36px;
    }
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
textarea,
select{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

textarea{
    min-height:100px;
}

.days{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

button{
    display:block;
    margin:40px auto 0;
    background:#e95d66;
    color:white;
    border:none;
    padding:18px 40px;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#666;
}

</style>
</head>

<body>

<div class="circle yellow"></div>
<div class="circle blue"></div>
<div class="circle green"></div>

<div class="container">

<img src="logo.png" class="logo">

<h1>Babysitter-Anmeldung</h1>

<p class="subtitle">
Vielen Dank für dein Interesse, als Babysitter tätig zu sein.<br>
Bitte fülle das Formular vollständig aus.
</p>

<div class="card">

<form action="https://api.web3forms.com/submit" method="POST">

    <input type="hidden" name="access_key" value="10208d19-ff5e-4629-80d0-a95ba0ce98ba">

    <input type="hidden"
           name="subject"
           value="Babysittervermittlung Anmeldung">

    <input type="hidden"
           name="from_name"
           value="Website Familienzentrum Garching">

<h2 class="section-title">👤 Persönliche Daten</h2>

<div class="row">
<div class="col">
<label>Vorname</label>
<input type="text">
</div>

<div class="col">
<label>Nachname</label>
<input type="text">
</div>
</div>

<div class="row">
<div class="col">
<label>Geburtsdatum</label>
<input type="date">
</div>

<div class="col">
<label>Adresse</label>
<input type="text">
</div>
</div>

<div class="row">
<div class="col">
<label>Telefonnummer</label>
<input type="tel">
</div>

<div class="col">
<label>E-Mail-Adresse</label>
<input type="email">
</div>
</div>

<h2 class="section-title">⭐ Erfahrung & Qualifikationen</h2>

<div class="row">
<div class="col">
<label>Hast du bereits Erfahrung?</label>
<select>
<option>Bitte auswählen</option>
<option>Ja</option>
<option>Nein</option>
</select>
</div>

<div class="col">
<label>Falls ja, wie lange?</label>
<input type="text" placeholder="z.B. 2 Jahre">
</div>
</div>

<label>Besondere Kenntnisse / Qualifikationen</label>
<textarea></textarea>

<h2 class="section-title">❤️ Verfügbarkeit</h2>

<label>An welchen Tagen bist du verfügbar?</label>

<div class="days">
<label><input type="checkbox"> Montag</label>
<label><input type="checkbox"> Dienstag</label>
<label><input type="checkbox"> Mittwoch</label>
<label><input type="checkbox"> Donnerstag</label>
<label><input type="checkbox"> Freitag</label>
<label><input type="checkbox"> Samstag</label>
<label><input type="checkbox"> Sonntag</label>
</div>

<br>

<label>Zu welchen Zeiten?</label>
<input type="text" placeholder="Nachmittags, Abends, Wochenende ...">

<h2 class="section-title">🛡 Sonstiges</h2>

<div class="row">
<div class="col">
<label>Warum möchtest du Babysitter werden?</label>
<textarea></textarea>
</div>

<div class="col">
<label>Gibt es etwas, das wir wissen sollten?</label>
<textarea></textarea>
</div>
</div>

<label>
<input type="checkbox">
Ich bestätige, dass alle Angaben korrekt sind.
</label>

<button type="submit">
🚀 Anmeldung absenden
</button>

</form>

</div>

<div class="footer">
Familienzentrum Garching • Wir freuen uns auf dich!
</div>

</div>

</body>
</html>
